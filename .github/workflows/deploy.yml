name: Build and Deploy to AKS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ACR_NAME: docinspectoracr
  AKS_CLUSTER: docinspector-aks
  AKS_RESOURCE_GROUP: doc-inspector-tf-rg
  NAMESPACE: doc-inspector

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — Build and push Docker images to ACR
  # ---------------------------------------------------------------------------
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: |
          az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push backend image
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/backend:${{ github.sha }} \
                       -t ${{ env.ACR_NAME }}.azurecr.io/backend:latest \
                       ./backend
          docker push ${{ env.ACR_NAME }}.azurecr.io/backend:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/backend:latest

      - name: Build and push frontend image
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/frontend:${{ github.sha }} \
                       -t ${{ env.ACR_NAME }}.azurecr.io/frontend:latest \
                       ./frontend
          docker push ${{ env.ACR_NAME }}.azurecr.io/frontend:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/frontend:latest

  # ---------------------------------------------------------------------------
  # Job 2 — Deploy to AKS (only on push to main, not on PRs)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ env.AKS_RESOURCE_GROUP }} \
            --name ${{ env.AKS_CLUSTER }} \
            --overwrite-existing

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/ingress.yaml
          kubectl apply -f k8s/hpa.yaml

      - name: Update image tags to current commit SHA
        run: |
          kubectl set image deployment/backend \
            backend=${{ env.ACR_NAME }}.azurecr.io/backend:${{ github.sha }} \
            -n ${{ env.NAMESPACE }}
          kubectl set image deployment/frontend \
            frontend=${{ env.ACR_NAME }}.azurecr.io/frontend:${{ github.sha }} \
            -n ${{ env.NAMESPACE }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend -n ${{ env.NAMESPACE }} --timeout=120s
          kubectl rollout status deployment/frontend -n ${{ env.NAMESPACE }} --timeout=120s

      - name: Show running pods
        run: kubectl get pods -n ${{ env.NAMESPACE }}
