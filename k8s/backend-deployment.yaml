apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: doc-inspector
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: docinspectoracr.azurecr.io/backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: azure-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: doc-inspector
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
