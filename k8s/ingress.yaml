apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: doc-inspector-ingress
  namespace: doc-inspector
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: webapprouting.kubernetes.azure.com
  rules:
    - http:
        paths:
          - path: /analyze
            pathType: Exact
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /batch-analyze
            pathType: Exact
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /static
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
